<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightLog - 나의 비행 기록기</title>
    <!-- Google Fonts: Outfit (숫자 및 영문용) & Noto Sans KR (한글용) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS 연결 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 헤더 영역 -->
        <header class="app-header">
            <div class="logo-container">
                <!-- 비행기 모양 SVG 로고 -->
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 16V14L13 9V3.5C13 2.67 12.33 2 11.5 2C10.67 2 10 2.67 10 3.5V9L2 14V16L10 13.5V19L8 20.5V22L11.5 21L15 22V20.5L13 19V13.5L21 16Z" fill="currentColor"/>
                </svg>
                <h1>FlightLog</h1>
            </div>
            <p class="subtitle">항공 IT 포트폴리오 - 나의 여정 기록 관리자</p>
        </header>

        <!-- 통계 대시보드 (Summary Section) -->
        <section class="summary-section">
            <div class="summary-card" id="stat-total-flights">
                <div class="stat-icon-wrapper blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">총 비행 횟수</span>
                    <span class="stat-value" id="total-flights-val">0</span>
                </div>
            </div>
            <div class="summary-card" id="stat-total-airlines">
                <div class="stat-icon-wrapper amber">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">탑승 항공사</span>
                    <span class="stat-value" id="total-airlines-val">0</span>
                </div>
            </div>
            <div class="summary-card" id="stat-total-types">
                <div class="stat-icon-wrapper emerald">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">탑승 기종 수</span>
                    <span class="stat-value" id="total-types-val">0</span>
                </div>
            </div>
        </section>

        <!-- 컨트롤바 (검색 & 추가 버튼) -->
        <div class="control-bar">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="항공사, 편명, 기종, 등록부호, 공항 코드로 검색...">
            </div>
            <button id="open-form-btn" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                새로운 비행 추가
            </button>
        </div>

        <!-- 메인 콘텐츠 영역 (그리드) -->
        <main class="main-content">
            <div class="flight-list-header">
                <h2>비행 기록 목록 <span id="filtered-count" class="count-badge">0</span></h2>
            </div>
            <!-- 비행 기록 보딩패스 카드가 렌더링될 영역 -->
            <div id="flight-cards-grid" class="flight-grid">
                <!-- script.js에 의해 동적으로 카드가 추가됨 -->
            </div>
            <!-- 비행 기록이 없을 때 보여줄 빈 화면 -->
            <div id="empty-state" class="empty-state hidden">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                <p>등록된 비행 기록이 없습니다.</p>
                <span>우측 상단의 '새로운 비행 추가' 버튼을 눌러 첫 기록을 등록해보세요!</span>
            </div>
        </main>
    </div>

    <!-- 비행 기록 추가 모달 창 -->
    <div id="form-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>새로운 비행 기록 등록</h2>
                <button id="close-modal-btn" class="close-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="close-icon"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="add-flight-form" class="flight-form">
                <div class="form-grid">
                    <!-- 탑승일 -->
                    <div class="form-group">
                        <label for="flight-date">탑승일 <span class="required">*</span></label>
                        <input type="date" id="flight-date" required>
                    </div>
                    <!-- 항공사 -->
                    <div class="form-group">
                        <label for="flight-airline">항공사 <span class="required">*</span></label>
                        <input type="text" id="flight-airline" placeholder="예: 대한항공, 아시아나항공" required>
                    </div>
                    <!-- 편명 -->
                    <div class="form-group">
                        <label for="flight-number">편명 <span class="required">*</span></label>
                        <div class="input-group-row">
                            <input type="text" id="flight-number" placeholder="예: KE1101, OZ8902" required>
                            <button type="button" id="btn-lookup-flight" class="btn btn-secondary btn-small">조회</button>
                        </div>
                        <div id="lookup-status" class="lookup-status-msg hidden"></div>
                    </div>
                    <!-- 등록부호 -->
                    <div class="form-group">
                        <label for="flight-registration">항공기 등록부호</label>
                        <input type="text" id="flight-registration" placeholder="예: HL8314">
                    </div>
                    <!-- 출발 공항 -->
                    <div class="form-group">
                        <label for="flight-dep">출발 공항 (IATA) <span class="required">*</span></label>
                        <input type="text" id="flight-dep" maxlength="3" placeholder="예: GMP, ICN" required>
                    </div>
                    <!-- 도착 공항 -->
                    <div class="form-group">
                        <label for="flight-arr">도착 공항 (IATA) <span class="required">*</span></label>
                        <input type="text" id="flight-arr" maxlength="3" placeholder="예: CJU, NRT" required>
                    </div>
                    <!-- 기종명 -->
                    <div class="form-group">
                        <label for="flight-typename">기종명 <span class="required">*</span></label>
                        <input type="text" id="flight-typename" placeholder="예: Airbus A321neo" required>
                    </div>
                    <!-- AeroType 기종 ID -->
                    <div class="form-group">
                        <label for="flight-typeid">AeroType 기종 ID</label>
                        <input type="text" id="flight-typeid" placeholder="예: a321neo, b787-family">
                        <small class="helper-text">AeroType 카드 ID와 일치하면 추후 연동 링크가 생성됩니다.</small>
                    </div>
                    <!-- 좌석 번호 -->
                    <div class="form-group">
                        <label for="flight-seat">좌석</label>
                        <input type="text" id="flight-seat" placeholder="예: 12C, 42A">
                    </div>
                </div>
                <!-- 메모 -->
                <div class="form-group full-width">
                    <label for="flight-memo">메모</label>
                    <textarea id="flight-memo" rows="3" placeholder="비행 경험, 날씨, 기내식 등 자유로운 기록을 남기세요."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-form-btn" class="btn btn-secondary">취소</button>
                    <button type="submit" class="btn btn-primary">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 푸터 영역 -->
    <footer class="app-footer">
        <p>&copy; 2026 FlightLog. Developed for Aviation IT Portfolio.</p>
        <p class="links">
            <span class="link-item">AeroType 연동 기종 사전 지원</span>
        </p>
    </footer>

    <!-- 자바스크립트 로드: 데이터 파일 먼저 로드 후 로직 스크립트 실행 -->
    <script src="data/sampleFlights.js"></script>
    <script src="data/mockFlightsDb.js"></script>
    <script src="script.js"></script>
</body>
</html>
